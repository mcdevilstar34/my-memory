<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my memory</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a; /* Hitam pekat */
            color: #ffffff; /* Teks putih */
        }

        /* Navbar Styling */
        .navbar {
            background-color: #000000;
            border-bottom: 2px solid #333333;
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero Section */
        .hero {
            padding: 60px 0;
            text-align: center;
            border-bottom: 1px solid #222;
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
        }
        .hero h1 {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Card Styling (B&W Anime Feel) */
        .book-card {
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 0; /* Ujung kotak/tajam ala panel manga */
            transition: all 0.3s ease-in-out;
            height: 100%;
        }
        .book-card:hover {
            transform: translateY(-8px);
            border-color: #ffffff; /* Efek highlight putih saat di-hover */
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }
        
        /* Cover Gambar (Wajib Grayscale) */
        .card-img-top {
            height: 350px;
            object-fit: cover;
            filter: grayscale(100%) contrast(120%); /* Efek hitam putih kontras tinggi */
            transition: filter 0.3s ease;
            border-bottom: 1px solid #333;
        }
        .book-card:hover .card-img-top {
            filter: grayscale(80%) contrast(130%); /* Sedikit lebih terang saat hover */
        }

        /* Button Styling */
        .btn-custom-outline {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            border-radius: 0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .btn-custom-outline:hover {
            background: #fff;
            color: #000;
        }

        .btn-custom-solid {
            background: #fff;
            color: #000;
            border: 1px solid #fff;
            border-radius: 0;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .btn-custom-solid:hover {
            background: #ccc;
            border-color: #ccc;
        }

        /* Modal Styling B&W */
        .modal-content {
            background-color: #111;
            border: 1px solid #fff;
            border-radius: 0;
        }
        .modal-header {
            border-bottom: 1px solid #333;
        }
        .modal-title {
            font-weight: 600;
        }
        .btn-close {
            filter: invert(1); /* Membuat icon X menjadi putih */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">my memory</a>
        </div>
    </nav>

    <div class="hero">
        <div class="container">
            <h1>non fiction & fiction Archive</h1>
            <p class="text-secondary">A collection of non-fiction and fiction books. Read, Preview, and Download.</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row g-4" id="book-container">
            </div>
    </div>

    <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="previewModalLabel">Book Title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="pdfIframe" src="" width="100%" height="600px" style="border: none;"></iframe>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-custom-outline w-100" data-bs-dismiss="modal">Close Preview</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 1. Data Dummy Buku (Bisa diganti atau ditambah)
        // Link gambar menggunakan unsplash untuk dummy cover, link PDF menggunakan dummy W3C.
        const books = [
            {
                id: 1,
                title: "Laut Bercerita",
                cover: "https://i.pinimg.com/736x/9a/bb/61/9abb61fcf68afd124375a82dfd02ca6a.jpg",
                description: "novel fiksi sejarah karya Leila S. Chudori yang diterbitkan pada tahun 2017. Novel ini mengisahkan tentang tragedi penculikan aktivis di Indonesia pada tahun 1998, dengan berlatar belakang waktu 90-an dan 2000.",
                pdfLink: "https://drive.google.com/file/d/1bNCTY1ZCn8jsRfTo5DWcbyfnLKhQ3zhl/view?usp=sharing",
                downloadLink: "https://drive.google.com/file/d/1bNCTY1ZCn8jsRfTo5DWcbyfnLKhQ3zhl/view?usp=sharing"
            },
            {
                id: 2,
                title: "modul matematika",
                cover: "https://i.pinimg.com/736x/e6/12/8d/e6128d9b54e23f2ea86fafd0bb6cfa6f.jpg",
                description: "Big Book Matematika  SMA Kelas 1, 2, & 3 persembahan dari CMedia hadir sebagai solusi bagi siswa SMA dan MA yang ingin memahami matematika secara menyeluruh dan mendalam.",
                pdfLink: "https://drive.google.com/file/d/1HWl8zoKbO6zFa_VE7KmC8Z_qpphLpwku/view?usp=sharing",
                downloadLink: "https://drive.google.com/file/d/1HWl8zoKbO6zFa_VE7KmC8Z_qpphLpwku/view?usp=sharing"
            },
            {
                id: 3,
                title: "modul inggris",
                cover: "https://i.pinimg.com/1200x/c0/fd/db/c0fddb938adda40f8997b718ecfb7d51.jpg",
                description: "Modul grammar bahasa Inggris mencakup berbagai aspek penting dalam memahami dan menggunakan bahasa Inggris dengan benar. ",
                pdfLink: "https://drive.google.com/file/d/1KNXq6tVsfBHBQlNhfNTSjg1kmA9l5EO0/view?usp=sharing",
                downloadLink: "https://drive.google.com/file/d/1KNXq6tVsfBHBQlNhfNTSjg1kmA9l5EO0/view?usp=sharing"
            },
             {
                id: 4,
                title: "48 hukum kekuasaan",
                cover: "https://i.pinimg.com/1200x/67/fd/13/67fd13dc710cbf9d12ed9b52e91c3087.jpg",
                description: "48 Hukum Kekuasaan adalah sebuah buku yang ditulis oleh Robert Greene yang membahas tentang strategi dan taktik untuk memperoleh, mempertahankan, dan menggunakan kekuasaan dalam berbagai situasi kehidupan.",
                pdfLink: "https://drive.google.com/file/d/1YeijgktyH8bxD_p3qV9OHMUjEzHJHs_g/view?usp=sharing",
                downloadLink: "https://drive.google.com/file/d/1YeijgktyH8bxD_p3qV9OHMUjEzHJHs_g/view?usp=sharing"
            },
            {
                id: 5,
                title: "filosofi teras",
                cover: "https://i.pinimg.com/736x/74/9c/73/749c735cbdd17cdd2c48585d85fc30e2.jpg",
                description: "Filosofi Teras adalah sebuah buku yang ditulis oleh henry manampiring yang membahas tentang filosofi hidup dan cara berpikir yang benar dan tenang.",
                pdfLink: "https://drive.google.com/file/d/1rkcDoDNE5WfzS8nogrbdqnoar4-yBX1h/view?usp=drive_link",
                downloadLink: "https://drive.google.com/file/d/1rkcDoDNE5WfzS8nogrbdqnoar4-yBX1h/view?usp=drive_link"
            },
             {
                id: 6,
                title: "madilog",
                cover: "https://i.pinimg.com/736x/ce/a6/ac/cea6ac6058f974246b69fbe661ca3d90.jpg",
                description: "Madilog adalah sebuah buku yang membahas tentang logika dan cara berpikir yang benar dari tan malaka.",
                pdfLink: "https://drive.google.com/file/d/1tIjRTGDw26xf3boV_6Si0Z2T0FrEb9U_/view?usp=drive_link",
                downloadLink: "https://drive.google.com/file/d/1tIjRTGDw26xf3boV_6Si0Z2T0FrEb9U_/view?usp=drive_link"
            },
            {
                id: 7,
                title: "is it bad or good habits",
                cover: "https://i.pinimg.com/736x/0a/45/f3/0a45f321c542e970ea41d185ba34674c.jpg",
                description: "Is It Bad or Good Habits is a book that discusses the importance of developing good habits and breaking bad ones.",
                pdfLink: "https://drive.google.com/file/d/1VStRR4WmU9v6mStvWacd93cbzF79TyBf/view?usp=drive_link",
                downloadLink: "https://drive.google.com/file/d/1VStRR4WmU9v6mStvWacd93cbzF79TyBf/view?usp=drive_link"
            },
             {
                id: 8,
                title: "seni berbicara kepada siapa saja",
                cover: "https://i.pinimg.com/736x/81/31/9b/81319b13d02a830faaf8628e1dd69baa.jpg",
                description: "Salah satu hal yang saya pelajari adalah tidak ada orang yang tidak bisa diajak bicara bila kita memiliki sifat yang tepat. Setelah membaca buku ini, Anda akan mampu mengikuti segala percakapan dengan penuh keyakinan, dan Anda akan tahu cara menyampaikan pesan dengan efektif, dalam situasi apa pun.",
                pdfLink: "https://drive.google.com/file/d/12dRxW6ZTS43pq4zikvEFZMregVjcc3px/view?usp=drive_link",
                downloadLink: "https://drive.google.com/file/d/12dRxW6ZTS43pq4zikvEFZMregVjcc3px/view?usp=drive_link"
            },
        ];

        // 2. Render Buku ke dalam HTML (Membangun Grid/Card secara dinamis)
        const bookContainer = document.getElementById('book-container');

        books.forEach(book => {
            // Membuat elemen kolom untuk tiap buku
            const col = document.createElement('div');
            col.className = 'col-12 col-md-6 col-lg-4';
            
            // Mengisi HTML untuk Card
            col.innerHTML = `
                <div class="card book-card">
                    <img src="${book.cover}" class="card-img-top" alt="${book.title} Cover">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold">${book.title}</h5>
                        <p class="card-text text-secondary mb-4">${book.description}</p>
                        
                        <div class="mt-auto d-flex gap-2">
                            <a href="${book.downloadLink}" target="_blank" class="btn btn-custom-solid flex-grow-1 text-center text-decoration-none">
                                Download
                            </a>
                        </div>
                    </div>
                </div>
            `;
            bookContainer.appendChild(col);
        });

        // 3. Fungsi untuk Membuka Modal Preview PDF
        function openPreview(title, pdfLink) {
            // Ubah judul modal
            document.getElementById('previewModalLabel').innerText = "Preview: " + title;
            // Pasang link PDF ke iframe
            document.getElementById('pdfIframe').src = pdfLink;
            
            // Panggil modal Bootstrap
            const modalElement = document.getElementById('previewModal');
            const previewModal = new bootstrap.Modal(modalElement);
            previewModal.show();
        }

        // 4. Reset Iframe ketika modal ditutup (mencegah memory leak / tetap loading)
        document.getElementById('previewModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('pdfIframe').src = "";
        });
    </script>
</body>
</html>
